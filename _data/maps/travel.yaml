quebec-city:
  title: Quebec City
  lat: 46.8137431
  lng: -71.2084061
  text: |
    We made a day trip here while in Montreal for IETF.  Quebec City was
    terrific, and while it was small, I could imagine spending a few quiet days
    here just enjoying the vibe and the scenery.

rio:
  title: Rio de Janeiro
  lat: -22.911111
  lng: -43.205556
  text: I went here on vacation in June 2025, and it was terrific!

